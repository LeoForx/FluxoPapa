<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexum Incorporações — Logo Animado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --navy:#1C3A5E; --red:#C8102E; }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a1420;
    width:100vw; height:100vh;
    display:flex; justify-content:center; align-items:center;
    overflow:hidden;
  }

  .scene {
    position:relative;
    width:820px; height:360px;
  }

  /* ── All anim elements hidden initially ── */
  .ae { position:absolute; opacity:0; }

  /* ── Forx Icon ── */
  #forx-wrap { top:50%; left:60px; transform:translateY(-50%); text-align:center; }
  #forx-wrap .lbl {
    margin-top:10px;
    font-family:'Barlow',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
    color:rgba(255,255,255,0.3);
  }

  /* ── Urbanfield Icon ── */
  #uf-wrap { top:50%; right:60px; transform:translateY(-50%); text-align:center; }
  #uf-wrap .lbl {
    margin-top:10px;
    font-family:'Barlow',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
    color:rgba(255,255,255,0.3);
  }

  /* ── Plus ── */
  #plus {
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-family:'Barlow',sans-serif; font-weight:100;
    font-size:36px; color:rgba(255,255,255,0.18);
  }

  /* ── Flash ── */
  #flash {
    top:50%; left:50%;
    width:10px; height:10px;
    margin:-5px 0 0 -5px;
    background:white;
    border-radius:50%;
  }

  /* ── Nexum Logo ── */
  #nexum {
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:flex; align-items:center; gap:30px;
  }

  /* Text */
  .letter {
    display:inline-block;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800; font-size:66px;
    letter-spacing:6px; line-height:1;
    color:#FFFFFF;
    opacity:0; transform:translateY(14px);
  }
  #sep-line {
    height:2px; background:var(--red);
    width:0; margin:10px 0 8px;
  }
  #sub {
    font-family:'Barlow',sans-serif; font-weight:300;
    font-size:12px; letter-spacing:5.5px; text-transform:uppercase;
    color:rgba(255,255,255,0.38);
    opacity:0; transform:translateY(5px);
  }

  /* ── CSS Keyframes ── */
  @keyframes kEnterL  { from{opacity:0;transform:translateY(-50%) translateX(-60px)} to{opacity:1;transform:translateY(-50%) translateX(0)} }
  @keyframes kEnterR  { from{opacity:0;transform:translateY(-50%) translateX(60px)}  to{opacity:1;transform:translateY(-50%) translateX(0)} }
  @keyframes kExitL   { from{opacity:1;transform:translateY(-50%) translateX(0) scale(1)} to{opacity:0;transform:translateY(-50%) translateX(160px) scale(0.25)} }
  @keyframes kExitR   { from{opacity:1;transform:translateY(-50%) translateX(0) scale(1)} to{opacity:0;transform:translateY(-50%) translateX(-160px) scale(0.25)} }
  @keyframes kFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes kFadeOut { from{opacity:1} to{opacity:0} }
  @keyframes kFlash   { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(70)} }
  @keyframes kLetter  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes kSubIn   { from{opacity:0;transform:translateY(5px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes kPulse      { 0%,100%{opacity:1} 50%{opacity:0.55} }
  @keyframes kDiamondPop { from{opacity:0;transform:scale(0) rotate(45deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
</style>
</head>
<body>
<div class="scene">

  <!-- FORX -->
  <div class="ae" id="forx-wrap">
    <svg width="90" height="90" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#C8102E"/>
      <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
      <!-- Segments like the real logo -->
      <path d="M50 3 A47 47 0 0 1 97 50 L50 50 Z" fill="rgba(0,0,0,0.12)"/>
      <path d="M50 97 A47 47 0 0 1 3 50 L50 50 Z" fill="rgba(0,0,0,0.12)"/>
      <!-- X -->
      <line x1="25" y1="25" x2="75" y2="75" stroke="white" stroke-width="14" stroke-linecap="round"/>
      <line x1="75" y1="25" x2="25" y2="75" stroke="white" stroke-width="14" stroke-linecap="round"/>
    </svg>
    <div class="lbl">Forx Engenharia</div>
  </div>

  <!-- URBANFIELD -->
  <div class="ae" id="uf-wrap">
    <svg width="90" height="90" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1C3A5E" rx="4"/>
      <!-- U icon (two pillars) like the real logo -->
      <rect x="14" y="20" width="20" height="62" rx="2" fill="white"/>
      <rect x="66" y="20" width="20" height="62" rx="2" fill="white"/>
      <rect x="14" y="20" width="72" height="20" rx="2" fill="white"/>
    </svg>
    <div class="lbl">Urbanfield Empreendimentos</div>
  </div>

  <!-- PLUS -->
  <div class="ae" id="plus">+</div>

  <!-- FLASH -->
  <div class="ae" id="flash"></div>

  <!-- NEXUM LOGO -->
  <div class="ae" id="nexum">
    <!-- INC mark animado -->
    <svg width="96" height="84" viewBox="0 0 116 92" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="cp-bg">
          <rect id="cp-bg-r" x="0" y="0" width="0" height="92"/>
        </clipPath>
        <clipPath id="cp-txt">
          <rect id="cp-txt-r" x="0" y="0" width="0" height="92"/>
        </clipPath>
        <clipPath id="cp-red">
          <rect id="cp-red-r" x="0" y="0" width="0" height="92"/>
        </clipPath>
      </defs>
      <rect x="0" y="0" width="116" height="92" fill="rgba(255,255,255,0.08)" rx="8" clip-path="url(#cp-bg)"/>
      <rect x="0" y="0" width="116" height="92" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="8" clip-path="url(#cp-bg)"/>
      <text id="inc-text" x="58" y="65" text-anchor="middle"
            font-family="'Barlow Condensed',sans-serif"
            font-weight="800" font-size="62" fill="white" letter-spacing="5"
            clip-path="url(#cp-txt)">INC</text>
      <rect x="18" y="80" width="80" height="4" rx="2" fill="#C8102E"
            clip-path="url(#cp-red)" id="inc-redline"/>
    </svg>

    <!-- Text -->
    <div id="text-blk">
      <div id="letters">
        <span class="letter" id="l0">N</span><span class="letter" id="l1">E</span><span class="letter" id="l2">X</span><span class="letter" id="l3">U</span><span class="letter" id="l4">M</span>
      </div>
      <div id="sep-line"></div>
      <div id="sub">Incorporações</div>
    </div>
  </div>

</div><!-- /scene -->

<script>
/* ── Helpers ── */
const $  = id => document.getElementById(id);
const sl = ms => new Promise(r => setTimeout(r, ms));

function css(el, anim, dur, ease='ease', delay=0, fill='forwards') {
  if (typeof el === 'string') el = $(el);
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = `${anim} ${dur}ms ${ease} ${delay}ms ${fill}`;
}

/* Easing functions */
function easeOutBack(t) {
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}
function easeInOut(t) { return t<0.5?2*t*t:-1+(4-2*t)*t; }
function easeOut3(t)  { return 1-Math.pow(1-t,3); }

/* Animate SVG attribute from a to b over dur ms */
function tweenAttr(id, attr, from, to, dur, easeFn=easeOut3) {
  return new Promise(resolve => {
    const el = $(id);
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now-start)/dur, 1);
      const v = from + (to-from)*easeFn(t);
      el.setAttribute(attr, v);
      if (t<1) requestAnimationFrame(tick);
      else resolve();
    }
    el.setAttribute(attr, from);
    requestAnimationFrame(tick);
  });
}

/* Animate CSS numeric property */
function tweenStyle(id, prop, from, to, unit, dur, easeFn=easeOut3) {
  return new Promise(resolve => {
    const el = $(id);
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now-start)/dur, 1);
      const v = from + (to-from)*easeFn(t);
      el.style[prop] = v+unit;
      if (t<1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

/* ── Reset to initial state ── */
function reset() {
  ['forx-wrap','uf-wrap','plus','flash','nexum'].forEach(id => {
    const el = $(id);
    el.style.cssText = 'opacity:0';
  });
  $('forx-wrap').style.transform = 'translateY(-50%)';
  $('uf-wrap').style.transform   = 'translateY(-50%)';
  $('cp-bg-r').setAttribute('width',  '0');
  $('cp-txt-r').setAttribute('width', '0');
  $('cp-red-r').setAttribute('width', '0');
  $('inc-redline').style.animation = 'none';
  document.querySelectorAll('.letter').forEach(l => {
    l.style.cssText = 'opacity:0;transform:translateY(14px)';
  });
  $('sep-line').style.cssText = 'height:2px;background:#C8102E;width:0;margin:10px 0 8px';
  $('sub').style.cssText = 'opacity:0;transform:translateY(5px);font-family:Barlow,sans-serif;font-weight:300;font-size:12px;letter-spacing:5.5px;text-transform:uppercase;color:rgba(255,255,255,0.38)';
  $('x-bar2').style.animation = 'none';
}

/* ── Main animation sequence ── */
async function run() {
  reset();
  await sl(300);

  /* 1 — Forx enters from left */
  css('forx-wrap', 'kEnterL', 650, 'cubic-bezier(0.34,1.56,0.64,1)');
  await sl(280);

  /* 2 — Urbanfield enters from right */
  css('uf-wrap', 'kEnterR', 650, 'cubic-bezier(0.34,1.56,0.64,1)');
  await sl(900);

  /* 3 — Plus sign */
  css('plus', 'kFadeIn', 350, 'ease');
  await sl(1000);

  /* 4 — Logos converge */
  css('plus',     'kFadeOut', 300, 'ease');
  css('forx-wrap','kExitL',   550, 'cubic-bezier(0.4,0,1,1)');
  css('uf-wrap',  'kExitR',   550, 'cubic-bezier(0.4,0,1,1)');
  await sl(380);

  /* 5 — Flash burst */
  $('flash').style.opacity = '1';
  css('flash', 'kFlash', 500, 'ease-out');
  await sl(180);

  /* 6 — Show Nexum container */
  $('nexum').style.opacity = '1';
  $('nexum').style.transform = 'translate(-50%,-50%) scale(0.85)';
  tweenStyle('nexum','scale',...[]); // just make it visible

  // Animate scale via JS
  const nxStart = performance.now();
  const nxEl = $('nexum');
  const scaleTween = new Promise(resolve => {
    function tick(now) {
      const t = Math.min((now-nxStart)/350, 1);
      const s = 0.85 + 0.15*easeOutBack(t);
      nxEl.style.transform = `translate(-50%,-50%) scale(${s})`;
      if(t<1) requestAnimationFrame(tick);
      else { nxEl.style.transform='translate(-50%,-50%)'; resolve(); }
    }
    requestAnimationFrame(tick);
  });

  /* 6a — Fundo do INC expande do centro */
  await tweenAttr('cp-bg-r', 'width', 0, 116, 320, easeOutBack);
  /* 6b — Texto INC revela */
  await tweenAttr('cp-txt-r', 'width', 0, 116, 280, easeInOut);
  await scaleTween;
  await sl(60);
  /* 6c — Linha vermelha se desenha */
  await tweenAttr('cp-red-r', 'width', 0, 116, 320, easeInOut);
  await sl(100);

  /* 7 — Letters appear */
  for (let i=0; i<5; i++) {
    const l = $(`l${i}`);
    l.style.cssText = 'display:inline-block;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:66px;letter-spacing:6px;line-height:1;color:white;opacity:0;transform:translateY(14px)';
    l.offsetHeight;
    l.style.animation = `kLetter 300ms cubic-bezier(0.34,1.56,0.64,1) forwards`;
    await sl(95);
  }
  await sl(180);

  /* 8 — Red separator line */
  tweenStyle('sep-line', 'width', 0, 100, '%', 440, easeInOut);
  await sl(460);

  /* 9 — Subtext */
  const sub = $('sub');
  sub.style.cssText = 'font-family:Barlow,sans-serif;font-weight:300;font-size:12px;letter-spacing:5.5px;text-transform:uppercase;color:rgba(255,255,255,0.38);opacity:0;transform:translateY(5px)';
  sub.offsetHeight;
  sub.style.animation = 'kSubIn 400ms ease forwards';
  await sl(400);

  /* 10 — Idle: pulse linha vermelha */
  $('inc-redline').style.animation = 'kPulse 2.8s ease-in-out infinite';

  /* Hold, then loop */
  await sl(4200);
  run();
}

document.fonts.ready.then(() => setTimeout(run, 400));
</script>
</body>
</html>
